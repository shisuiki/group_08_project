<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalshi Market Chart</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5f6f7d;
      --line: #d9e1e8;
      --surface: #ffffff;
      --band: #f4f7f9;
      --accent: #0f766e;
      --warn: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--band);
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) minmax(220px, 1fr) auto auto auto;
      gap: 10px;
      align-items: end;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input,
    select,
    button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input,
    select {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 650;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .status {
      display: flex;
      gap: 12px;
      align-items: center;
      min-height: 40px;
      padding: 8px 16px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: var(--surface);
    }

    .status strong {
      color: var(--ink);
    }

    .chart-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(360px, 1fr) 120px;
    }

    #chart,
    #volume {
      min-height: 0;
      background: var(--surface);
    }

    #volume {
      border-top: 1px solid var(--line);
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      background: #fff;
      white-space: nowrap;
    }

    .warn {
      color: var(--warn);
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="toolbar">
      <label>
        Adapter
        <input id="adapter" placeholder="http://127.0.0.1:8090">
      </label>
      <label>
        Symbol
        <input id="symbol" list="symbols" placeholder="KXHIGHCHI-...">
        <datalist id="symbols"></datalist>
      </label>
      <label>
        Resolution
        <select id="resolution">
          <option value="1S">1 second</option>
          <option value="1" selected>1 minute</option>
          <option value="5">5 minutes</option>
          <option value="60">1 hour</option>
          <option value="1D">1 day</option>
        </select>
      </label>
      <button id="load" class="primary">Load</button>
      <button id="replay">Replay</button>
    </section>
    <section class="chart-shell">
      <div id="chart"></div>
      <div id="volume"></div>
    </section>
    <section class="status">
      <span class="pill">Mode <strong id="mode">live</strong></span>
      <span class="pill">Bid <strong id="bid">-</strong></span>
      <span class="pill">Ask <strong id="ask">-</strong></span>
      <span class="pill">Events <strong id="events">0</strong></span>
      <span id="message"></span>
    </section>
  </main>
  <script src="datafeed.js"></script>
</body>
</html>
