      BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS: ${BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS:-1000}
      BACKEND_WS_RECONNECT_MAX_BACKOFF_MS: ${BACKEND_WS_RECONNECT_MAX_BACKOFF_MS:-30000}
      BACKEND_WS_RECONNECT_MAX_ATTEMPTS: ${BACKEND_WS_RECONNECT_MAX_ATTEMPTS:-0}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED: ${BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED:-false}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT: ${BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT:-64}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS: ${BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS:-1}
      BACKEND_METRICS_HOST: ${BACKEND_METRICS_HOST:-0.0.0.0}
      BACKEND_METRICS_PORT: ${BACKEND_METRICS_PORT:-8091}
      WSCLIENT_START_DELAY_SECONDS: ${WSCLIENT_START_DELAY_SECONDS:-20}
      DB_WRITER_ENABLED: ${DB_WRITER_ENABLED:-}
      DB_WRITER_DATABASE_URL: ${DB_WRITER_DATABASE_URL:-}
      DB_WRITER_DATABASE_USER: ${DB_WRITER_DATABASE_USER:-}
      DB_WRITER_DATABASE_PASSWORD: ${DB_WRITER_DATABASE_PASSWORD:-}
      DB_WRITER_QUEUE_CAPACITY: ${DB_WRITER_QUEUE_CAPACITY:-250000}
      DB_WRITER_BATCH_SIZE: ${DB_WRITER_BATCH_SIZE:-500}
      DB_WRITER_RAW_SOURCE: ${DB_WRITER_RAW_SOURCE:-kalshi.websocket}
      DB_WRITER_RAW_CAPTURE_ID: ${DB_WRITER_RAW_CAPTURE_ID:-live}
      RAW_INGEST_RECORDER_ENABLED: ${RAW_INGEST_RECORDER_ENABLED:-false}
      RAW_INGEST_RECORDER_ROOT: ${RAW_INGEST_RECORDER_ROOT:-/app/recordings/raw-ingest}
      RAW_INGEST_RECORDER_SOURCE: ${RAW_INGEST_RECORDER_SOURCE:-kalshi.websocket}
      RAW_INGEST_RECORDER_CAPTURE_ID: ${RAW_INGEST_RECORDER_CAPTURE_ID:-live}
