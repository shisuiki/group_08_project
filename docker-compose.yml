services:
  node0:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - NODE_ID=0
      - CLUSTER_PORT_BASE=9000
      - DISPLAY=:1
    networks:
      cluster_net:
        ipv4_address: 172.20.0.2
    ports:
      - "9001-9006:9001-9006"
      - "40456:40456"
      - "40457:40457"
    volumes:
      - ./logs/node0:/app/cluster
      - /tmp/.X11-unix:/tmp/.X11-unix
    shm_size: '2gb'

  node1:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - NODE_ID=1
      - CLUSTER_PORT_BASE=9000
      - DISPLAY=:1
    networks:
      cluster_net:
        ipv4_address: 172.20.0.3
    ports:
      - "9101-9106:9001-9006"
      - "40458:40456"
      - "40459:40457"
    volumes:
      - ./logs/node1:/app/cluster
      - /tmp/.X11-unix:/tmp/.X11-unix
    shm_size: '2gb'

  node2:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - NODE_ID=2
      - CLUSTER_PORT_BASE=9000
      - DISPLAY=:1
    networks:
      cluster_net:
        ipv4_address: 172.20.0.4
    ports:
      - "9201-9206:9001-9006"
      - "40460:40456"
      - "40461:40457"
    volumes:
      - ./logs/node2:/app/cluster
      - /tmp/.X11-unix:/tmp/.X11-unix
    shm_size: '2gb'
  
  wsclient:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - CLUSTER_PORT_BASE=9300
      - IP=172.20.0.6
    networks:
      cluster_net:
        ipv4_address: 172.20.0.6
    volumes:
      - ./logs/wsclient:/app/cluster
      - ./keys/key.txt:/app/key.txt # put your key directory here
    shm_size: '2gb'
    command: >
      sh -c "java -cp /app/app.jar edu.illinois.group8.KalshiSystem"

