services:
  node0:
    build: .
    image: ${KALSHI_APP_IMAGE:-kalshi-project:local}
    profiles: ["cluster-live", "single-node-local", "live-product", "live-product-local-db"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
        required: false
      db-migrate-live:
        condition: service_completed_successfully
        required: false
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CLUSTER_ADDRESSES:-172.20.0.2,172.20.0.3,172.20.0.4}
      BASE_DIR: /app
      NODE_ID: "0"
      CLUSTER_PORT_BASE: ${CLUSTER_PORT_BASE:-9000}
      AERON_INTERNAL_CHANNEL: ${AERON_INTERNAL_CHANNEL:-aeron:ipc}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      BACKEND_START_DEMO_CLIENT: ${BACKEND_START_DEMO_CLIENT:-false}
      BACKEND_SOURCE_SEQUENCE_MONITOR_ENABLED: ${BACKEND_SOURCE_SEQUENCE_MONITOR_ENABLED:-false}
      BACKEND_ORDERBOOK_DERIVED_ENABLED: ${BACKEND_ORDERBOOK_DERIVED_ENABLED:-true}
      BACKEND_TIMESTAMP_SOURCE: ${BACKEND_TIMESTAMP_SOURCE:-system_nano}
      DB_WRITER_ENABLED: ${DB_WRITER_ENABLED:-}
      DB_WRITER_DATABASE_URL: ${DB_WRITER_DATABASE_URL:-}
      DB_WRITER_DATABASE_USER: ${DB_WRITER_DATABASE_USER:-}
      DB_WRITER_DATABASE_PASSWORD: ${DB_WRITER_DATABASE_PASSWORD:-}
      DB_WRITER_QUEUE_CAPACITY: ${DB_WRITER_QUEUE_CAPACITY:-250000}
      DB_WRITER_BATCH_SIZE: ${DB_WRITER_BATCH_SIZE:-500}
      DB_WRITER_RAW_SOURCE: ${DB_WRITER_RAW_SOURCE:-kalshi.websocket}
      DB_WRITER_RAW_CAPTURE_ID: ${DB_WRITER_RAW_CAPTURE_ID:-live}
      EC2_PTP_DEVICE: ${EC2_PTP_DEVICE:-/dev/ptp_ena}
      ENABLE_EC2_PTP: ${ENABLE_EC2_PTP:-false}
    networks:
      cluster_net:
        ipv4_address: ${CLUSTER_NODE0_IP:-172.20.0.2}
    ports:
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${NODE0_CLUSTER_PORT_RANGE:-9001-9006}:9001-9006"
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${NODE0_AERON_PORT:-40456}:40456"
    shm_size: "2gb"

  node0-capture:
    build: .
    image: ${KALSHI_APP_IMAGE:-kalshi-project:local}
    profiles: ["recording-capture"]
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CAPTURE_CLUSTER_ADDRESSES:-172.20.0.2}
      BASE_DIR: /app
      NODE_ID: "0"
      CLUSTER_PORT_BASE: ${CLUSTER_PORT_BASE:-9000}
      AERON_INTERNAL_CHANNEL: ${AERON_INTERNAL_CHANNEL:-aeron:ipc}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
