services:
  etcd-1:
    image: quay.io/coreos/etcd:v3.5.17
    platform: linux/arm64
    entrypoint: /usr/local/bin/etcd
    ports:
      - "23790:2379"
      - "23800:2380"
    command:
      - '--name=etcd-1'
      - '--initial-advertise-peer-urls=http://172.20.0.5:2380'
      - '--listen-peer-urls=http://0.0.0.0:2380'
      - '--listen-client-urls=http://0.0.0.0:2379'
      - '--advertise-client-urls=http://172.20.0.5:2379'
      - '--heartbeat-interval=250'
      - '--election-timeout=1250'
      - '--initial-cluster=etcd-1=http://172.20.0.5:2380,etcd-2=http://172.20.0.6:2380,etcd-3=http://172.20.0.7:2380'
      - '--initial-cluster-state=new'
      - '--initial-cluster-token=mys3cr3ttok3n'
      - '--log-level=error'
    volumes:
      - etcd1:/etcd_data
    networks:
      cluster_net:
        ipv4_address: 172.20.0.5

  etcd-2:
    image: quay.io/coreos/etcd:v3.5.17
    platform: linux/arm64
    entrypoint: /usr/local/bin/etcd
    ports:
      - "23791:2379"
      - "23801:2380"
    command:
      - '--name=etcd-2'
      - '--initial-advertise-peer-urls=http://172.20.0.6:2380'
      - '--listen-peer-urls=http://0.0.0.0:2380'
      - '--listen-client-urls=http://0.0.0.0:2379'
      - '--advertise-client-urls=http://172.20.0.6:2379'
      - '--heartbeat-interval=250'
      - '--election-timeout=1250'
      - '--initial-cluster=etcd-1=http://172.20.0.5:2380,etcd-2=http://172.20.0.6:2380,etcd-3=http://172.20.0.7:2380'
      - '--initial-cluster-state=new'
      - '--initial-cluster-token=mys3cr3ttok3n'
      - '--log-level=error'
    volumes:
      - etcd2:/etcd_data
    networks:
      cluster_net:
        ipv4_address: 172.20.0.6

  etcd-3:
    image: quay.io/coreos/etcd:v3.5.17
    platform: linux/arm64
    entrypoint: /usr/local/bin/etcd
    ports:
      - "23792:2379"
      - "23802:2380"
    command:
      - '--name=etcd-3'
      - '--initial-advertise-peer-urls=http://172.20.0.7:2380'
      - '--listen-peer-urls=http://0.0.0.0:2380'
      - '--listen-client-urls=http://0.0.0.0:2379'
      - '--advertise-client-urls=http://172.20.0.7:2379'
      - '--heartbeat-interval=250'
      - '--election-timeout=1250'
      - '--initial-cluster=etcd-1=http://172.20.0.5:2380,etcd-2=http://172.20.0.6:2380,etcd-3=http://172.20.0.7:2380'
      - '--initial-cluster-state=new'
      - '--initial-cluster-token=mys3cr3ttok3n'
      - '--log-level=error'
    volumes:
      - etcd3:/etcd_data
    networks:
      cluster_net:
        ipv4_address: 172.20.0.7

  node0:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - NODE_ID=0
      - CLUSTER_PORT_BASE=9000
    networks:
      cluster_net:
        ipv4_address: 172.20.0.2
    ports:
      - "9001-9006:9001-9006"
    volumes:
      - ./logs/node0:/app/cluster
    shm_size: '2gb'

  node1:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - NODE_ID=1
      - CLUSTER_PORT_BASE=9100
    networks:
      cluster_net:
        ipv4_address: 172.20.0.3
    ports:
      - "9101-9106:9101-9106"
    volumes:
      - ./logs/node1:/app/cluster
    shm_size: '2gb'

  node2:
    build: .
    environment:
      - CLUSTER_ADDRESSES=172.20.0.2,172.20.0.3,172.20.0.4
      - BASE_DIR=/app
      - NODE_ID=2
      - CLUSTER_PORT_BASE=9200
    networks:
      cluster_net:
        ipv4_address: 172.20.0.4
    ports:
      - "9201-9206:9201-9206"
    volumes:
      - ./logs/node2:/app/cluster
    shm_size: '2gb'

networks:
  cluster_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
    etcd1:
    etcd2:
    etcd3: