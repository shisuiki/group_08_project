services:
  node0:
    build: .
    profiles: ["cluster-live", "single-node-local"]
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CLUSTER_ADDRESSES:-172.20.0.2,172.20.0.3,172.20.0.4}
      BASE_DIR: /app
      NODE_ID: "0"
      CLUSTER_PORT_BASE: ${CLUSTER_PORT_BASE:-9000}
      AERON_INTERNAL_CHANNEL: ${AERON_INTERNAL_CHANNEL:-aeron:ipc}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      BACKEND_JOURNAL_ROOT: ${BACKEND_JOURNAL_ROOT:-/app/journal}
      BACKEND_START_DEMO_CLIENT: ${BACKEND_START_DEMO_CLIENT:-false}
    networks:
      cluster_net:
        ipv4_address: ${CLUSTER_NODE0_IP:-172.20.0.2}
    ports:
      - "${NODE0_CLUSTER_PORT_RANGE:-9001-9006}:9001-9006"
      - "${NODE0_AERON_PORT:-40456}:40456"
    volumes:
      - ./journal:/app/journal
    shm_size: "2gb"

  node1:
    build: .
    profiles: ["cluster-live"]
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CLUSTER_ADDRESSES:-172.20.0.2,172.20.0.3,172.20.0.4}
      BASE_DIR: /app
      NODE_ID: "1"
      CLUSTER_PORT_BASE: ${CLUSTER_PORT_BASE:-9000}
      AERON_INTERNAL_CHANNEL: ${AERON_INTERNAL_CHANNEL:-aeron:ipc}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      BACKEND_JOURNAL_ROOT: ${BACKEND_JOURNAL_ROOT:-/app/journal}
    networks:
      cluster_net:
        ipv4_address: ${CLUSTER_NODE1_IP:-172.20.0.3}
    ports:
      - "${NODE1_CLUSTER_PORT_RANGE:-9101-9106}:9001-9006"
      - "${NODE1_AERON_PORT:-40458}:40456"
    volumes:
      - ./journal:/app/journal
    shm_size: "2gb"

  node2:
    build: .
    profiles: ["cluster-live"]
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CLUSTER_ADDRESSES:-172.20.0.2,172.20.0.3,172.20.0.4}
      BASE_DIR: /app
      NODE_ID: "2"
      CLUSTER_PORT_BASE: ${CLUSTER_PORT_BASE:-9000}
      AERON_INTERNAL_CHANNEL: ${AERON_INTERNAL_CHANNEL:-aeron:ipc}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      BACKEND_JOURNAL_ROOT: ${BACKEND_JOURNAL_ROOT:-/app/journal}
    networks:
      cluster_net:
        ipv4_address: ${CLUSTER_NODE2_IP:-172.20.0.4}
    ports:
      - "${NODE2_CLUSTER_PORT_RANGE:-9201-9206}:9001-9006"
      - "${NODE2_AERON_PORT:-40460}:40456"
    volumes:
      - ./journal:/app/journal
    shm_size: "2gb"

  wsclient:
    build: .
    profiles: ["cluster-live"]
    depends_on:
      - node0
      - node1
      - node2
    restart: unless-stopped
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CLUSTER_ADDRESSES:-172.20.0.2,172.20.0.3,172.20.0.4}
      BASE_DIR: /app
      IP: ${WSCLIENT_IP:-172.20.0.6}
      KALSHI_BASE_URL: ${KALSHI_BASE_URL:-https://api.elections.kalshi.com}
      KALSHI_KEY_ID: ${KALSHI_KEY_ID:?Set KALSHI_KEY_ID for live ingestion}
      KALSHI_KEY_PATH: ${KALSHI_KEY_PATH:-/run/secrets/kalshi_private_key}
      KALSHI_MARKET_TICKERS: ${KALSHI_MARKET_TICKERS:-}
      KALSHI_MARKET_SERIES_TICKER: ${KALSHI_MARKET_SERIES_TICKER:-}
      KALSHI_WS_CHANNELS: ${KALSHI_WS_CHANNELS:-orderbook_delta,trade,ticker,market_lifecycle_v2}
      WSCLIENT_START_DELAY_SECONDS: ${WSCLIENT_START_DELAY_SECONDS:-20}
    networks:
      cluster_net:
        ipv4_address: ${WSCLIENT_IP:-172.20.0.6}
    volumes:
      - ${KALSHI_KEY_HOST_PATH:?Set KALSHI_KEY_HOST_PATH to your private key file}:${KALSHI_KEY_PATH:-/run/secrets/kalshi_private_key}:ro
    shm_size: "2gb"
    command: >
      sh -c "sleep $${WSCLIENT_START_DELAY_SECONDS:-20}; java -cp /app/app.jar edu.illinois.group8.KalshiSystem"

  replay:
    build: .
    profiles: ["replay"]
    environment:
      BACKEND_PROFILE: replay
      BACKEND_JOURNAL_ROOT: ${BACKEND_JOURNAL_ROOT:-/app/journal}
    volumes:
      - ./journal:/app/journal
    command: >
      sh -c "java -cp /app/app.jar edu.illinois.group8.replay.ReplayCli --journal-root=/app/journal"

  streamtap:
    build: .
    profiles: ["cluster-live"]
    restart: unless-stopped
    environment:
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      STREAM_TAP_CHANNEL: ${STREAM_TAP_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      STREAM_TAP_PORT: ${STREAM_TAP_PORT:-8080}
      STREAM_TAP_STREAMS: ${STREAM_TAP_STREAMS:-canonical.trade,canonical.ticker,canonical.open_interest,derived.top_of_book,system.sequence_gaps}
      STREAM_TAP_MAX_EVENTS: ${STREAM_TAP_MAX_EVENTS:-200}
    networks:
      cluster_net:
        ipv4_address: ${STREAM_TAP_IP:-172.20.0.7}
    ports:
      - "127.0.0.1:${STREAM_TAP_HOST_PORT:-8080}:${STREAM_TAP_PORT:-8080}"
    shm_size: "512mb"
    command: >
      sh -c "java -cp /app/app.jar edu.illinois.group8.stream.StreamTapServer"

networks:
  cluster_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CLUSTER_SUBNET:-172.20.0.0/16}
