  #     - ./logs/publisher:/app/cluster
  #   shm_size: '2gb'
  #   command: >
  #     sh -c "java -cp /app/app.jar edu.illinois.group8.tests.TestPublisher 'Hello Cluster!'"
             
networks:
  cluster_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16