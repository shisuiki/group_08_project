    profiles: ["observability"]
    depends_on:
      - streamtap
    ports:
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cluster_net

  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["observability"]
    depends_on:
      - prometheus
    ports:
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - cluster_net

networks:
  cluster_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CLUSTER_SUBNET:-172.20.0.0/16}

volumes:
  timescale_data:
