  wsclient:
    build: .
    image: ${KALSHI_APP_IMAGE:-kalshi-project:local}
    profiles: ["cluster-live", "live-product", "live-product-local-db"]
    depends_on:
      node0:
        condition: service_started
      node1:
        condition: service_started
      node2:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
        required: false
      db-migrate-live:
        condition: service_completed_successfully
        required: false
    restart: unless-stopped
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-docker}
      CLUSTER_ADDRESSES: ${CLUSTER_ADDRESSES:-172.20.0.2,172.20.0.3,172.20.0.4}
      BASE_DIR: /app
      IP: ${WSCLIENT_IP:-172.20.0.6}
      KALSHI_BASE_URL: ${KALSHI_BASE_URL:-https://api.elections.kalshi.com}
      KALSHI_KEY_ID: ${KALSHI_KEY_ID:-}
      KALSHI_KEY_PATH: ${KALSHI_KEY_PATH:-/run/secrets/kalshi_private_key}
      KALSHI_MARKET_TICKERS: ${KALSHI_MARKET_TICKERS:-}
      KALSHI_MARKET_SERIES_TICKER: ${KALSHI_MARKET_SERIES_TICKER:-}
      KALSHI_MARKET_SELECTION_MODE: ${KALSHI_MARKET_SELECTION_MODE:-configured}
      KALSHI_MARKET_STATUS: ${KALSHI_MARKET_STATUS:-open}
      KALSHI_MARKET_MVE_FILTER: ${KALSHI_MARKET_MVE_FILTER:-}
      KALSHI_MARKET_DISCOVERY_LIMIT: ${KALSHI_MARKET_DISCOVERY_LIMIT:-1000}
      KALSHI_MARKET_DISCOVERY_MAX_MARKETS: ${KALSHI_MARKET_DISCOVERY_MAX_MARKETS:-0}
      KALSHI_WS_CHANNELS: ${KALSHI_WS_CHANNELS:-orderbook_delta,trade,ticker,market_lifecycle_v2}
      KALSHI_WS_GLOBAL_CHANNELS: ${KALSHI_WS_GLOBAL_CHANNELS:-}
      KALSHI_WS_FILTERED_CHANNELS: ${KALSHI_WS_FILTERED_CHANNELS:-}
      KALSHI_ORDERBOOK_SUBSCRIPTION_CHUNK_SIZE: ${KALSHI_ORDERBOOK_SUBSCRIPTION_CHUNK_SIZE:-100}
      KALSHI_ORDERBOOK_MARKETS_PER_CONNECTION: ${KALSHI_ORDERBOOK_MARKETS_PER_CONNECTION:-10000}
      KALSHI_WS_SUBSCRIPTION_DELAY_MS: ${KALSHI_WS_SUBSCRIPTION_DELAY_MS:-250}
      KALSHI_WS_ACK_TIMEOUT_MS: ${KALSHI_WS_ACK_TIMEOUT_MS:-30000}
      BACKEND_WS_RECONNECT_ENABLED: ${BACKEND_WS_RECONNECT_ENABLED:-true}
      BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS: ${BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS:-1000}
      BACKEND_WS_RECONNECT_MAX_BACKOFF_MS: ${BACKEND_WS_RECONNECT_MAX_BACKOFF_MS:-30000}
      BACKEND_WS_RECONNECT_MAX_ATTEMPTS: ${BACKEND_WS_RECONNECT_MAX_ATTEMPTS:-0}
      AERON_EXTERNAL_CHANNEL: ${AERON_EXTERNAL_CHANNEL:-aeron:udp?endpoint=224.0.1.1:40456}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED: ${BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED:-false}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT: ${BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT:-64}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS: ${BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS:-1}
      BACKEND_METRICS_HOST: ${BACKEND_METRICS_HOST:-0.0.0.0}
      BACKEND_METRICS_PORT: ${BACKEND_METRICS_PORT:-8091}
      WSCLIENT_START_DELAY_SECONDS: ${WSCLIENT_START_DELAY_SECONDS:-20}
      DB_WRITER_ENABLED: ${DB_WRITER_ENABLED:-}
      DB_WRITER_DATABASE_URL: ${DB_WRITER_DATABASE_URL:-}
      DB_WRITER_DATABASE_USER: ${DB_WRITER_DATABASE_USER:-}
      DB_WRITER_DATABASE_PASSWORD: ${DB_WRITER_DATABASE_PASSWORD:-}
      DB_WRITER_QUEUE_CAPACITY: ${DB_WRITER_QUEUE_CAPACITY:-250000}
      DB_WRITER_BATCH_SIZE: ${DB_WRITER_BATCH_SIZE:-500}
      DB_WRITER_RAW_SOURCE: ${DB_WRITER_RAW_SOURCE:-kalshi.websocket}
      DB_WRITER_RAW_CAPTURE_ID: ${DB_WRITER_RAW_CAPTURE_ID:-live}
      EC2_PTP_DEVICE: ${EC2_PTP_DEVICE:-/dev/ptp_ena}
      ENABLE_EC2_PTP: ${ENABLE_EC2_PTP:-false}
    ports:
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${WSCLIENT_METRICS_HOST_PORT:-8091}:8091"
    networks:
      cluster_net:
        ipv4_address: ${WSCLIENT_IP:-172.20.0.6}
    volumes:
      - ${KALSHI_KEY_HOST_PATH:-./secrets/kalshi_private_key}:${KALSHI_KEY_PATH:-/run/secrets/kalshi_private_key}:ro
    shm_size: "2gb"
    command: >
      sh -c "sleep $${WSCLIENT_START_DELAY_SECONDS:-20}; java -cp /app/app.jar edu.illinois.group8.KalshiSystem"

  wsclient-capture:
    build: .
    image: ${KALSHI_APP_IMAGE:-kalshi-project:local}
    profiles: ["recording-capture"]
    depends_on:
      - node0-capture
    restart: unless-stopped
    environment:
      BACKEND_PROFILE: ${BACKEND_PROFILE:-recording-capture}
