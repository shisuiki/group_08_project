    ports:
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${NODE1_CLUSTER_PORT_RANGE:-9101-9106}:9001-9006"
      - "${COMPOSE_HOST_BIND_IP:-127.0.0.1}:${NODE1_AERON_PORT:-40458}:40456"
    shm_size: "2gb"

  node2:
