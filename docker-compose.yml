    command: >
      sh -c "sleep $${WSCLIENT_START_DELAY_SECONDS:-20}; java -cp /app/app.jar edu.illinois.group8.KalshiSystem"

  raw-ingress-replay:
    build: .
    image: ${KALSHI_APP_IMAGE:-kalshi-project:local}
    profiles: ["raw-replay"]
    environment:
      BACKEND_PROFILE: replay
      CLUSTER_ADDRESSES: ${CAPTURE_CLUSTER_ADDRESSES:-172.20.0.2}
      IP: ${RAW_REPLAY_IP:-172.20.0.11}
      BASE_DIR: /app
      RAW_REPLAY_SOURCE: ${RAW_REPLAY_SOURCE:-timescale}
      RAW_REPLAY_LOCAL_ROOT: ${RAW_REPLAY_LOCAL_ROOT:-/app/recordings/raw-ingest}
      RAW_REPLAY_DATABASE_URL: ${RAW_REPLAY_DATABASE_URL:-}
      RAW_REPLAY_DATABASE_USER: ${RAW_REPLAY_DATABASE_USER:-}
      RAW_REPLAY_DATABASE_PASSWORD: ${RAW_REPLAY_DATABASE_PASSWORD:-}
      RAW_REPLAY_TABLE: ${RAW_REPLAY_TABLE:-raw_ws_events}
      RAW_REPLAY_RAW_PAYLOAD_COLUMN: ${RAW_REPLAY_RAW_PAYLOAD_COLUMN:-raw_payload}
      RAW_REPLAY_RECEIVE_TS_NS_COLUMN: ${RAW_REPLAY_RECEIVE_TS_NS_COLUMN:-receive_ts_ns}
      RAW_REPLAY_CONNECTION_ID_COLUMN: ${RAW_REPLAY_CONNECTION_ID_COLUMN:-connection_id}
      RAW_REPLAY_SEQUENCE_COLUMN: ${RAW_REPLAY_SEQUENCE_COLUMN:-connection_sequence}
      RAW_REPLAY_RAW_EVENT_ID_COLUMN: ${RAW_REPLAY_RAW_EVENT_ID_COLUMN:-raw_event_id}
      RAW_REPLAY_MARKET_TICKER_COLUMN: ${RAW_REPLAY_MARKET_TICKER_COLUMN:-market_ticker}
      RAW_REPLAY_START_RECEIVE_TS_NS: ${RAW_REPLAY_START_RECEIVE_TS_NS:-}
      RAW_REPLAY_END_RECEIVE_TS_NS: ${RAW_REPLAY_END_RECEIVE_TS_NS:-}
      RAW_REPLAY_MARKET_TICKERS: ${RAW_REPLAY_MARKET_TICKERS:-}
      RAW_REPLAY_RAW_EVENT_IDS: ${RAW_REPLAY_RAW_EVENT_IDS:-}
      RAW_REPLAY_REQUIRE_BOUNDED_SELECTION: ${RAW_REPLAY_REQUIRE_BOUNDED_SELECTION:-true}
      RAW_REPLAY_MODE: ${RAW_REPLAY_MODE:-as-fast-as-possible}
      RAW_REPLAY_FIXED_RATE_PER_SECOND: ${RAW_REPLAY_FIXED_RATE_PER_SECOND:-0}
      RAW_REPLAY_SPEED_MULTIPLIER: ${RAW_REPLAY_SPEED_MULTIPLIER:-1.0}
      RAW_REPLAY_MAX_EVENTS: ${RAW_REPLAY_MAX_EVENTS:-0}
      RAW_REPLAY_DRY_RUN: ${RAW_REPLAY_DRY_RUN:-false}
      RAW_REPLAY_ID: ${RAW_REPLAY_ID:-}
    networks:
      cluster_net:
        ipv4_address: ${RAW_REPLAY_IP:-172.20.0.11}
    volumes:
      - ./recordings:/app/recordings:ro
    shm_size: "512mb"
    command: >
      sh -c "java -cp /app/app.jar edu.illinois.group8.replay.raw.RawIngressReplayCli"

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    profiles: ["local-db", "db-primary-product", "live-product-local-db"]
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME:-kalshi_test}
      POSTGRES_USER: ${LOCAL_DB_USER:-kalshi}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-kalshi}
    ports:
