          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "chmod 600 '$DEPLOY_PATH/.env.next'"

      - name: Deploy Docker Compose stack with rollback gate
        run: |
          printf -v q_deploy_path '%q' "$DEPLOY_PATH"
          printf -v q_deploy_profile '%q' "$DEPLOY_PROFILE"
          printf -v q_kalshi_app_image '%q' "$KALSHI_APP_IMAGE"
          printf -v q_candidate_image_tar '%q' "$KALSHI_APP_IMAGE_TAR"
          printf -v q_kalshi_release_sha '%q' "$KALSHI_RELEASE_SHA"
          printf -v q_kalshi_github_run_id '%q' "$KALSHI_GITHUB_RUN_ID"
          printf -v q_kalshi_github_run_attempt '%q' "$KALSHI_GITHUB_RUN_ATTEMPT"
          printf -v q_wsclient_metrics_host_port '%q' "$WSCLIENT_METRICS_HOST_PORT"
          printf -v q_wsclient_capture_metrics_host_port '%q' "$WSCLIENT_CAPTURE_METRICS_HOST_PORT"
          printf -v q_stream_tap_host_port '%q' "$STREAM_TAP_HOST_PORT"
          printf -v q_stream_recorder_host_port '%q' "$STREAM_RECORDER_HOST_PORT"
          printf -v q_featureplant_metrics_host_port '%q' "$FEATUREPLANT_METRICS_HOST_PORT"
          printf -v q_db_primary_product_frontend_host_port '%q' "$DB_PRIMARY_PRODUCT_FRONTEND_HOST_PORT"
          printf -v q_wsclient_start_delay_seconds '%q' "$WSCLIENT_START_DELAY_SECONDS"
          printf -v q_deploy_db_preflight_required '%q' "$DEPLOY_DB_PREFLIGHT_REQUIRED"
          printf -v q_live_product_semantic_smoke_enabled '%q' "$LIVE_PRODUCT_SEMANTIC_SMOKE_ENABLED"
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
            "cd $q_deploy_path && DEPLOY_PROFILE=$q_deploy_profile KALSHI_APP_IMAGE=$q_kalshi_app_image CANDIDATE_IMAGE_TAR=$q_candidate_image_tar KALSHI_RELEASE_SHA=$q_kalshi_release_sha KALSHI_GITHUB_RUN_ID=$q_kalshi_github_run_id KALSHI_GITHUB_RUN_ATTEMPT=$q_kalshi_github_run_attempt CANDIDATE_ENV_FILE=.env.next DEPLOY_STATE_DIR=.deploy-state WSCLIENT_METRICS_HOST_PORT=$q_wsclient_metrics_host_port WSCLIENT_CAPTURE_METRICS_HOST_PORT=$q_wsclient_capture_metrics_host_port STREAM_TAP_HOST_PORT=$q_stream_tap_host_port STREAM_RECORDER_HOST_PORT=$q_stream_recorder_host_port FEATUREPLANT_METRICS_HOST_PORT=$q_featureplant_metrics_host_port DB_PRIMARY_PRODUCT_FRONTEND_HOST_PORT=$q_db_primary_product_frontend_host_port WSCLIENT_START_DELAY_SECONDS=$q_wsclient_start_delay_seconds DEPLOY_DB_PREFLIGHT_REQUIRED=$q_deploy_db_preflight_required LIVE_PRODUCT_SEMANTIC_SMOKE_ENABLED=$q_live_product_semantic_smoke_enabled sh scripts/ec2-compose-rollback-gate.sh"

      - name: Verify live-product release evidence
        if: env.DEPLOY_PROFILE == 'live-product'
        run: |
          evidence_file=".deploy-state/releases/${KALSHI_RELEASE_SHA}-${KALSHI_GITHUB_RUN_ID}-${KALSHI_GITHUB_RUN_ATTEMPT}.json"
          local_evidence="release-evidence/${KALSHI_RELEASE_SHA}-${KALSHI_GITHUB_RUN_ID}-${KALSHI_GITHUB_RUN_ATTEMPT}.json"
          mkdir -p release-evidence
          printf -v q_deploy_path '%q' "$DEPLOY_PATH"
          printf -v q_evidence_file '%q' "$evidence_file"
          printf -v q_remote_evidence_path '%q' "$DEPLOY_PATH/$evidence_file"
          printf -v q_kalshi_release_sha '%q' "$KALSHI_RELEASE_SHA"
          printf -v q_kalshi_github_run_id '%q' "$KALSHI_GITHUB_RUN_ID"
          printf -v q_kalshi_github_run_attempt '%q' "$KALSHI_GITHUB_RUN_ATTEMPT"
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
            "cd $q_deploy_path && EXPECTED_KALSHI_RELEASE_SHA=$q_kalshi_release_sha EXPECTED_KALSHI_GITHUB_RUN_ID=$q_kalshi_github_run_id EXPECTED_KALSHI_GITHUB_RUN_ATTEMPT=$q_kalshi_github_run_attempt sh scripts/verify-live-product-release-evidence.sh $q_evidence_file"
          scp -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST:$q_remote_evidence_path" "$local_evidence"
          EXPECTED_KALSHI_RELEASE_SHA="$KALSHI_RELEASE_SHA" \
          EXPECTED_KALSHI_GITHUB_RUN_ID="$KALSHI_GITHUB_RUN_ID" \
          EXPECTED_KALSHI_GITHUB_RUN_ATTEMPT="$KALSHI_GITHUB_RUN_ATTEMPT" \
              scripts/verify-live-product-release-evidence.sh "$local_evidence"
          LIVE_PRODUCT_RELEASE_EVIDENCE_ARTIFACT_NAME="$LIVE_PRODUCT_RELEASE_EVIDENCE_ARTIFACT_NAME" \
          EXPECTED_KALSHI_RELEASE_SHA="$KALSHI_RELEASE_SHA" \
          EXPECTED_KALSHI_GITHUB_RUN_ID="$KALSHI_GITHUB_RUN_ID" \
          EXPECTED_KALSHI_GITHUB_RUN_ATTEMPT="$KALSHI_GITHUB_RUN_ATTEMPT" \
              scripts/verify-live-product-release-evidence.sh --summary-md "$local_evidence" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live-product release evidence
        if: env.DEPLOY_PROFILE == 'live-product'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.LIVE_PRODUCT_RELEASE_EVIDENCE_ARTIFACT_NAME }}
          path: release-evidence/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Run live-product smoke
        if: env.DEPLOY_PROFILE == 'live-product' && env.RUN_LIVE_PRODUCT_SMOKE == 'true'
        run: |
          set -euo pipefail
          rehearsal_name="${KALSHI_RELEASE_SHA}-${KALSHI_GITHUB_RUN_ID}-${KALSHI_GITHUB_RUN_ATTEMPT}-live-product-rehearsal"
          rehearsal_dir=".deploy-state/releases/${rehearsal_name}"
          rehearsal_tar=".deploy-state/releases/${rehearsal_name}.tar.gz"
          local_rehearsal_dir="live-product-rehearsal"
          printf -v q_deploy_path '%q' "$DEPLOY_PATH"
          printf -v q_kalshi_release_sha '%q' "$KALSHI_RELEASE_SHA"
          printf -v q_kalshi_app_image '%q' "$KALSHI_APP_IMAGE"
          printf -v q_deploy_profile '%q' "$DEPLOY_PROFILE"
          printf -v q_kalshi_github_run_id '%q' "$KALSHI_GITHUB_RUN_ID"
          printf -v q_kalshi_github_run_attempt '%q' "$KALSHI_GITHUB_RUN_ATTEMPT"
          printf -v q_live_product_browser_smoke_enabled '%q' "$LIVE_PRODUCT_BROWSER_SMOKE_ENABLED"
          printf -v q_require_live_product_data '%q' "$REQUIRE_LIVE_PRODUCT_DATA"
          printf -v q_rehearsal_dir '%q' "$rehearsal_dir"
          printf -v q_rehearsal_tar '%q' "$rehearsal_tar"

          set +e
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
            "cd $q_deploy_path && KALSHI_RELEASE_SHA=$q_kalshi_release_sha KALSHI_GITHUB_RUN_ID=$q_kalshi_github_run_id KALSHI_GITHUB_RUN_ATTEMPT=$q_kalshi_github_run_attempt KALSHI_DEPLOY_PROFILE=$q_deploy_profile EXPECTED_KALSHI_RELEASE_SHA=$q_kalshi_release_sha EXPECTED_KALSHI_APP_IMAGE=$q_kalshi_app_image EXPECTED_KALSHI_DEPLOY_PROFILE=$q_deploy_profile LIVE_PRODUCT_BROWSER_SMOKE_ENABLED=$q_live_product_browser_smoke_enabled LIVE_PRODUCT_SMOKE_REQUIRE_LIVE_DATA=$q_require_live_product_data REHEARSAL_DIR=$q_rehearsal_dir REHEARSAL_TAR=$q_rehearsal_tar bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$REHEARSAL_DIR/browser"
          stdout="$REHEARSAL_DIR/live-product-smoke.stdout.log"
          stderr="$REHEARSAL_DIR/live-product-smoke.stderr.log"
          summary="$REHEARSAL_DIR/live-product-rehearsal-summary.md"
          browser_evidence="$REHEARSAL_DIR/browser/browser-smoke.json"
          browser_dom="$REHEARSAL_DIR/browser/dashboard.dom.html"
          browser_screenshot="$REHEARSAL_DIR/browser/dashboard.png"
          browser_log="$REHEARSAL_DIR/browser/browser.log"

          smoke_status=0
          EXPECTED_KALSHI_RELEASE_SHA="$EXPECTED_KALSHI_RELEASE_SHA" \
          EXPECTED_KALSHI_APP_IMAGE="$EXPECTED_KALSHI_APP_IMAGE" \
          EXPECTED_KALSHI_DEPLOY_PROFILE="$EXPECTED_KALSHI_DEPLOY_PROFILE" \
          LIVE_PRODUCT_BROWSER_SMOKE_ENABLED="$LIVE_PRODUCT_BROWSER_SMOKE_ENABLED" \
          LIVE_PRODUCT_SMOKE_REQUIRE_LIVE_DATA="$LIVE_PRODUCT_SMOKE_REQUIRE_LIVE_DATA" \
          LIVE_PRODUCT_SMOKE_DOCKER_SUDO=true \
          FRONTEND_BROWSER_SMOKE_DOCKER_ENABLED=true \
          FRONTEND_BROWSER_SMOKE_DOCKER_PREFER=true \
          FRONTEND_BROWSER_SMOKE_DOCKER_SUDO=true \
          FRONTEND_BROWSER_SMOKE_DOCKER_NETWORK=host \
          FRONTEND_BROWSER_SMOKE_EVIDENCE_FILE="$browser_evidence" \
          FRONTEND_BROWSER_SMOKE_OUTPUT_DIR="$REHEARSAL_DIR/browser" \
          FRONTEND_BROWSER_SMOKE_DOM_FILE="$browser_dom" \
          FRONTEND_BROWSER_SMOKE_SCREENSHOT_FILE="$browser_screenshot" \
          FRONTEND_BROWSER_SMOKE_LOG_FILE="$browser_log" \
            sh scripts/live-product-smoke.sh > "$stdout" 2> "$stderr" || smoke_status=$?

          python3 - "$stdout" "$browser_evidence" "$summary" \
            "$KALSHI_RELEASE_SHA" "$KALSHI_GITHUB_RUN_ID" "$KALSHI_GITHUB_RUN_ATTEMPT" \
            "$KALSHI_DEPLOY_PROFILE" "$LIVE_PRODUCT_SMOKE_REQUIRE_LIVE_DATA" \
            "$LIVE_PRODUCT_BROWSER_SMOKE_ENABLED" "$smoke_status" <<'PY'
          import json
          import shlex
          import sys
          from pathlib import Path

          stdout_path, browser_path, summary_path = sys.argv[1:4]
          release_sha, run_id, run_attempt, deploy_profile = sys.argv[4:8]
          require_live_data, browser_enabled, smoke_status = sys.argv[8:11]

          def parse_pass_line(name):
              prefix = f"PASS {name} "
              selected = None
              path = Path(stdout_path)
              if path.is_file():
                  with path.open("r", encoding="utf-8") as handle:
                      for line in handle:
                          line = line.strip()
                          if line.startswith(prefix):
                              selected = line[len(prefix):]
              if selected is None:
                  return {}
              fields = {}
              for token in shlex.split(selected):
                  if "=" in token:
                      key, value = token.split("=", 1)
                      fields[key] = value
              return fields

          final = parse_pass_line("live_product_smoke")
          latency = parse_pass_line("product_latency")

          browser = {}
          browser_evidence = Path(browser_path)
          if browser_evidence.is_file():
              try:
                  browser = json.loads(browser_evidence.read_text(encoding="utf-8"))
              except Exception as exc:
                  browser = {"status": "malformed", "reason": str(exc)}
          elif browser_enabled == "true":
              browser = {"status": "missing"}
          else:
              browser = {"status": "not_requested"}

          def md(value):
              if value is None:
                  return ""
              return str(value).replace("|", "\\|").replace("\n", " ")

          rows = (
              ("release_sha", release_sha),
              ("github_run_id", run_id),
              ("github_run_attempt", run_attempt),
              ("deploy_profile", deploy_profile),
              ("smoke_exit_code", smoke_status),
              ("live_data_required", require_live_data),
              ("live_data_observed", final.get("live_data_observed", "")),
              ("freshness_source_kind", final.get("freshness_source_kind", "")),
              ("freshness_live_data_observed", final.get("freshness_live_data_observed", "")),
              ("product_readiness", final.get("product_readiness_status", "")),
              ("product_readiness_stale", final.get("product_readiness_stale", "")),
              ("product_readiness_degraded", final.get("product_readiness_degraded", "")),
              ("frontend_feature_source", final.get("feature_source", "")),
              ("latency_status", latency.get("status", "")),
              ("seed_to_frontend_quote_ms", latency.get("seed_to_frontend_quote_ms", "")),
              ("seed_to_sse_ms", latency.get("seed_to_sse_ms", "")),
              ("browser_status", browser.get("status", "")),
              ("browser_mode", browser.get("mode", "")),
              ("browser_reason", browser.get("reason", "")),
              ("browser_dom_sha256", browser.get("dom_sha256", "")),
              ("browser_screenshot_sha256", browser.get("screenshot_sha256", "")),
          )
          out = ["### Live Product Rehearsal Evidence", "", "| Field | Value |", "| --- | --- |"]
          for key, value in rows:
              out.append(f"| {key} | {md(value)} |")
          Path(summary_path).write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          if [ "$smoke_status" -eq 0 ]; then
            cat "$stdout"
          else
            printf 'live-product smoke failed; stdout/stderr/browser artifacts were written under %s\n' "$REHEARSAL_DIR" >&2
            sed -n '1,160p' "$stdout" >&2 || true
            sed -n '1,160p' "$stderr" >&2 || true
          fi
          tar -czf "$REHEARSAL_TAR" -C "$REHEARSAL_DIR" .
          exit "$smoke_status"
          REMOTE
          remote_status=$?
          set -e

          rm -rf "$local_rehearsal_dir"
          mkdir -p "$local_rehearsal_dir"
          if scp -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST:$DEPLOY_PATH/$rehearsal_tar" "$local_rehearsal_dir/rehearsal.tar.gz"; then
            tar -xzf "$local_rehearsal_dir/rehearsal.tar.gz" -C "$local_rehearsal_dir"
            if [ -s "$local_rehearsal_dir/live-product-rehearsal-summary.md" ]; then
              cat "$local_rehearsal_dir/live-product-rehearsal-summary.md" >> "$GITHUB_STEP_SUMMARY"
            fi
          elif [ "$remote_status" -eq 0 ]; then
            printf 'failed to download live-product rehearsal artifact tar\n' >&2
            exit 1
          fi
          exit "$remote_status"

      - name: Upload live-product rehearsal evidence
        if: always() && env.DEPLOY_PROFILE == 'live-product' && env.RUN_LIVE_PRODUCT_SMOKE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.LIVE_PRODUCT_REHEARSAL_ARTIFACT_NAME }}
          path: live-product-rehearsal/**
          if-no-files-found: warn
          retention-days: 30

      - name: Show service status
        if: always()
        run: |
          printf -v q_deploy_path '%q' "$DEPLOY_PATH"
          printf -v q_deploy_profile '%q' "$DEPLOY_PROFILE"
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "cd $q_deploy_path && sudo docker compose --env-file .env --profile $q_deploy_profile ps" || true
