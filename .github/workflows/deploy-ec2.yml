          FEATUREPLANT_RECORDING_ROOT=$FEATUREPLANT_RECORDING_ROOT
          FEATUREPLANT_AERON_CHANNEL=$FEATUREPLANT_AERON_CHANNEL
          FEATUREPLANT_STREAMS=$FEATUREPLANT_STREAMS
