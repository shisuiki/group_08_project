name: CI/CD Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_profile:
        description: Docker Compose deploy profile
        required: false
        default: cluster-live
        type: choice
        options:
          - cluster-live
          - live-product
      run_live_product_smoke:
        description: Run an extra live-product DB/FeaturePlant/frontend smoke after rollback-gated deploy
        required: false
        default: false
        type: boolean
      run_live_product_browser_smoke:
        description: Open the live-product dashboard with a headless browser during the manual smoke
        required: false
        default: false
        type: boolean
      require_live_product_data:
        description: Require the manual live-product smoke to prove real non-smoke Kalshi data through DB, FeaturePlant, and frontend
        required: false
        default: false
        type: boolean

concurrency:
  group: ec2-production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      KALSHI_APP_IMAGE: kalshi-project:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Build Maven package
        run: mvn -B -DskipTests package

      - name: Validate Docker build context
        run: scripts/validate-docker-build-context.sh

      - name: Build Docker image
        run: docker build --pull --build-arg MAVEN_PACKAGE_ARGS="-DskipTests package" -t "$KALSHI_APP_IMAGE" .

      - name: Export Docker image artifact
        run: |
          set -euo pipefail
          mkdir -p image-artifact
          docker image inspect "$KALSHI_APP_IMAGE" >/dev/null
          docker save "$KALSHI_APP_IMAGE" | gzip -1 > "image-artifact/kalshi-project-${GITHUB_SHA}.tar.gz"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v6
        with:
          name: kalshi-project-image-${{ github.sha }}
          path: image-artifact/kalshi-project-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Validate shell scripts
        run: |
          set -euo pipefail
          bash -n scripts/db-primary-demo-seed.sh
          sh -n scripts/db-primary-demo-seed.sh
          bash -n scripts/db-primary-demo-run-featureplant.sh
          sh -n scripts/db-primary-demo-run-featureplant.sh
          bash -n scripts/db-primary-demo-pipeline.sh
          sh -n scripts/db-primary-demo-pipeline.sh
          bash -n scripts/db-primary-product-smoke.sh
          sh -n scripts/db-primary-product-smoke.sh
          bash -n scripts/live-product-smoke.sh
          sh -n scripts/live-product-smoke.sh
          bash -n scripts/frontend-product-browser-smoke.sh
          sh -n scripts/frontend-product-browser-smoke.sh
          bash -n scripts/db-primary-demo-smoke.sh
          sh -n scripts/db-primary-demo-smoke.sh
          bash -n scripts/ec2-compose-rollback-gate.sh
          sh -n scripts/ec2-compose-rollback-gate.sh
          bash -n scripts/validate-docker-build-context.sh
          sh -n scripts/validate-docker-build-context.sh
          bash -n scripts/validate-compose-profiles.sh
          sh -n scripts/validate-compose-profiles.sh
          bash -n scripts/validate-release-evidence.sh
          sh -n scripts/validate-release-evidence.sh
          bash -n scripts/verify-live-product-release-evidence.sh
          sh -n scripts/verify-live-product-release-evidence.sh

      - name: Validate Docker Compose profiles
        run: scripts/validate-compose-profiles.sh

      - name: Validate release evidence contract
        run: scripts/validate-release-evidence.sh

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/group_08_project' }}
      DEPLOY_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_profile || vars.DEPLOY_PROFILE || 'cluster-live' }}
      KALSHI_APP_IMAGE: kalshi-project:${{ github.sha }}
      KALSHI_APP_IMAGE_TAR: .deploy-state/images/kalshi-project-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}.tar.gz
      KALSHI_RELEASE_SHA: ${{ github.sha }}
      KALSHI_DEPLOY_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_profile || vars.DEPLOY_PROFILE || 'cluster-live' }}
      KALSHI_GITHUB_RUN_ID: ${{ github.run_id }}
      KALSHI_GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      LIVE_PRODUCT_RELEASE_EVIDENCE_ARTIFACT_NAME: live-product-release-evidence-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      LIVE_PRODUCT_REHEARSAL_ARTIFACT_NAME: live-product-rehearsal-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      RUN_LIVE_PRODUCT_SMOKE: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.run_live_product_smoke) || 'false' }}
      LIVE_PRODUCT_BROWSER_SMOKE_ENABLED: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.run_live_product_browser_smoke) || vars.LIVE_PRODUCT_BROWSER_SMOKE_ENABLED || 'false' }}
      REQUIRE_LIVE_PRODUCT_DATA: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.require_live_product_data) || 'false' }}
      LIVE_PRODUCT_SEMANTIC_SMOKE_ENABLED: ${{ vars.LIVE_PRODUCT_SEMANTIC_SMOKE_ENABLED || 'true' }}
      COMPOSE_HOST_BIND_IP: ${{ vars.COMPOSE_HOST_BIND_IP || '127.0.0.1' }}
      KALSHI_BASE_URL: ${{ vars.KALSHI_BASE_URL || 'https://api.elections.kalshi.com' }}
      KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
      KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
      KALSHI_MARKET_TICKERS: ${{ vars.KALSHI_MARKET_TICKERS }}
      KALSHI_MARKET_SERIES_TICKER: ${{ vars.KALSHI_MARKET_SERIES_TICKER || 'KXHIGHCHI' }}
      KALSHI_MARKET_SELECTION_MODE: ${{ vars.KALSHI_MARKET_SELECTION_MODE || 'configured' }}
      KALSHI_MARKET_STATUS: ${{ vars.KALSHI_MARKET_STATUS || 'open' }}
      KALSHI_MARKET_MVE_FILTER: ${{ vars.KALSHI_MARKET_MVE_FILTER }}
      KALSHI_MARKET_DISCOVERY_LIMIT: ${{ vars.KALSHI_MARKET_DISCOVERY_LIMIT || '1000' }}
      KALSHI_MARKET_DISCOVERY_MAX_MARKETS: ${{ vars.KALSHI_MARKET_DISCOVERY_MAX_MARKETS || '0' }}
      KALSHI_WS_CHANNELS: ${{ vars.KALSHI_WS_CHANNELS || 'orderbook_delta,trade,ticker,market_lifecycle_v2' }}
      KALSHI_WS_GLOBAL_CHANNELS: ${{ vars.KALSHI_WS_GLOBAL_CHANNELS }}
      KALSHI_WS_FILTERED_CHANNELS: ${{ vars.KALSHI_WS_FILTERED_CHANNELS }}
      KALSHI_ORDERBOOK_SUBSCRIPTION_CHUNK_SIZE: ${{ vars.KALSHI_ORDERBOOK_SUBSCRIPTION_CHUNK_SIZE || '100' }}
      KALSHI_ORDERBOOK_MARKETS_PER_CONNECTION: ${{ vars.KALSHI_ORDERBOOK_MARKETS_PER_CONNECTION || '10000' }}
      KALSHI_WS_SUBSCRIPTION_DELAY_MS: ${{ vars.KALSHI_WS_SUBSCRIPTION_DELAY_MS || '250' }}
      KALSHI_WS_ACK_TIMEOUT_MS: ${{ vars.KALSHI_WS_ACK_TIMEOUT_MS || '30000' }}
      BACKEND_WS_RECONNECT_ENABLED: ${{ vars.BACKEND_WS_RECONNECT_ENABLED || 'true' }}
      BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS: ${{ vars.BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS || '1000' }}
      BACKEND_WS_RECONNECT_MAX_BACKOFF_MS: ${{ vars.BACKEND_WS_RECONNECT_MAX_BACKOFF_MS || '30000' }}
      BACKEND_WS_RECONNECT_MAX_ATTEMPTS: ${{ vars.BACKEND_WS_RECONNECT_MAX_ATTEMPTS || '0' }}
      BACKEND_SOURCE_SEQUENCE_MONITOR_ENABLED: ${{ vars.BACKEND_SOURCE_SEQUENCE_MONITOR_ENABLED || 'false' }}
      BACKEND_ORDERBOOK_DERIVED_ENABLED: ${{ vars.BACKEND_ORDERBOOK_DERIVED_ENABLED || 'true' }}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED: ${{ vars.BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED || 'false' }}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT: ${{ vars.BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT || '64' }}
      BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS: ${{ vars.BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS || '1' }}
      BACKEND_METRICS_PORT: ${{ vars.BACKEND_METRICS_PORT || '8091' }}
      WSCLIENT_METRICS_HOST_PORT: ${{ vars.WSCLIENT_METRICS_HOST_PORT || '8091' }}
      WSCLIENT_CAPTURE_METRICS_HOST_PORT: ${{ vars.WSCLIENT_CAPTURE_METRICS_HOST_PORT || '8093' }}
      BACKEND_TIMESTAMP_SOURCE: ${{ vars.BACKEND_TIMESTAMP_SOURCE || 'system_nano' }}
      DEPLOY_DB_PREFLIGHT_REQUIRED: ${{ vars.DEPLOY_DB_PREFLIGHT_REQUIRED || 'false' }}
      DB_WRITER_ENABLED: ${{ vars.DB_WRITER_ENABLED }}
      DB_WRITER_DATABASE_URL: ${{ vars.DB_WRITER_DATABASE_URL }}
      DB_WRITER_DATABASE_USER: ${{ vars.DB_WRITER_DATABASE_USER }}
      DB_WRITER_DATABASE_PASSWORD: ${{ secrets.DB_WRITER_DATABASE_PASSWORD }}
      DB_WRITER_QUEUE_CAPACITY: ${{ vars.DB_WRITER_QUEUE_CAPACITY || '250000' }}
      DB_WRITER_BATCH_SIZE: ${{ vars.DB_WRITER_BATCH_SIZE || '500' }}
      DB_WRITER_RAW_SOURCE: ${{ vars.DB_WRITER_RAW_SOURCE || 'kalshi.websocket' }}
      DB_WRITER_RAW_CAPTURE_ID: ${{ vars.DB_WRITER_RAW_CAPTURE_ID || 'live' }}
      LOCAL_DB_NAME: ${{ vars.LOCAL_DB_NAME || 'kalshi_test' }}
      LOCAL_DB_USER: ${{ vars.LOCAL_DB_USER || 'kalshi' }}
      LOCAL_DB_PASSWORD: ${{ secrets.LOCAL_DB_PASSWORD || secrets.DB_WRITER_DATABASE_PASSWORD || 'kalshi' }}
      RAW_INGEST_RECORDER_ENABLED: ${{ vars.RAW_INGEST_RECORDER_ENABLED || 'false' }}
      RAW_INGEST_RECORDER_ROOT: ${{ vars.RAW_INGEST_RECORDER_ROOT || '/app/recordings/raw-ingest' }}
      RAW_INGEST_RECORDER_SOURCE: ${{ vars.RAW_INGEST_RECORDER_SOURCE || 'kalshi.websocket' }}
      RAW_INGEST_RECORDER_CAPTURE_ID: ${{ vars.RAW_INGEST_RECORDER_CAPTURE_ID || 'live' }}
      RAW_INGEST_RECORDER_QUEUE_CAPACITY: ${{ vars.RAW_INGEST_RECORDER_QUEUE_CAPACITY || '250000' }}
      RAW_INGEST_RECORDER_DROP_ON_FULL: ${{ vars.RAW_INGEST_RECORDER_DROP_ON_FULL || 'true' }}
      RAW_INGEST_RECORDER_PARTITION_GRANULARITY: ${{ vars.RAW_INGEST_RECORDER_PARTITION_GRANULARITY || 'minute' }}
      RAW_INGEST_RECORDER_TIMESTAMP_SOURCE: ${{ vars.RAW_INGEST_RECORDER_TIMESTAMP_SOURCE || 'system_nano' }}
      RAW_REPLAY_SOURCE: ${{ vars.RAW_REPLAY_SOURCE || 'timescale' }}
      RAW_REPLAY_DATABASE_URL: ${{ vars.RAW_REPLAY_DATABASE_URL }}
      RAW_REPLAY_DATABASE_USER: ${{ vars.RAW_REPLAY_DATABASE_USER }}
      RAW_REPLAY_DATABASE_PASSWORD: ${{ secrets.RAW_REPLAY_DATABASE_PASSWORD }}
      RAW_REPLAY_TABLE: ${{ vars.RAW_REPLAY_TABLE || 'raw_ws_events' }}
      RAW_REPLAY_REQUIRE_BOUNDED_SELECTION: ${{ vars.RAW_REPLAY_REQUIRE_BOUNDED_SELECTION || 'true' }}
      AERON_EXTERNAL_CHANNEL: ${{ vars.AERON_EXTERNAL_CHANNEL || 'aeron:udp?endpoint=224.0.1.1:40456' }}
      STREAM_TAP_HOST_PORT: ${{ vars.STREAM_TAP_HOST_PORT || '8080' }}
      STREAM_TAP_STREAMS: ${{ vars.STREAM_TAP_STREAMS || 'canonical.trade,canonical.ticker,canonical.open_interest,derived.top_of_book,system.sequence_gaps' }}
      STREAM_RECORDER_HOST_PORT: ${{ vars.STREAM_RECORDER_HOST_PORT || '8092' }}
      STREAM_RECORDER_AERON_CHANNEL: ${{ vars.STREAM_RECORDER_AERON_CHANNEL }}
      STREAM_RECORDER_STREAMS: ${{ vars.STREAM_RECORDER_STREAMS || 'all-normalized' }}
      STREAM_RECORDER_TIMESTAMP_SOURCE: ${{ vars.STREAM_RECORDER_TIMESTAMP_SOURCE || 'system_nano' }}
      STREAM_RECORDER_RECENT_EVENTS: ${{ vars.STREAM_RECORDER_RECENT_EVENTS || '200' }}
      STREAM_RECORDER_PARTITION_GRANULARITY: ${{ vars.STREAM_RECORDER_PARTITION_GRANULARITY || 'hour' }}
      S3_RECORDING_BUCKET: ${{ vars.S3_RECORDING_BUCKET }}
      S3_RECORDING_PREFIX: ${{ vars.S3_RECORDING_PREFIX || 'kalshi-normalized/' }}
      S3_RECORDING_SUBTREES: ${{ vars.S3_RECORDING_SUBTREES || 'canonical,raw-ingest,raw-rest' }}
      S3_UPLOAD_INTERVAL_SECONDS: ${{ vars.S3_UPLOAD_INTERVAL_SECONDS || '60' }}
      S3_UPLOAD_MIN_AGE_SECONDS: ${{ vars.S3_UPLOAD_MIN_AGE_SECONDS || '120' }}
      S3_DELETE_AFTER_UPLOAD: ${{ vars.S3_DELETE_AFTER_UPLOAD || 'false' }}
      HISTORICAL_BACKFILL_OUTPUT_ROOT: ${{ vars.HISTORICAL_BACKFILL_OUTPUT_ROOT || '/app/recordings' }}
      HISTORICAL_BACKFILL_CANONICAL_SUBTREE: ${{ vars.HISTORICAL_BACKFILL_CANONICAL_SUBTREE || 'canonical' }}
      HISTORICAL_BACKFILL_RAW_REST_ROOT: ${{ vars.HISTORICAL_BACKFILL_RAW_REST_ROOT || '/app/recordings/raw-rest' }}
      HISTORICAL_BACKFILL_TICKERS: ${{ vars.HISTORICAL_BACKFILL_TICKERS }}
      HISTORICAL_BACKFILL_SERIES_TICKER: ${{ vars.HISTORICAL_BACKFILL_SERIES_TICKER }}
      HISTORICAL_BACKFILL_MARKET_STATUS: ${{ vars.HISTORICAL_BACKFILL_MARKET_STATUS || 'open' }}
      HISTORICAL_BACKFILL_MVE_FILTER: ${{ vars.HISTORICAL_BACKFILL_MVE_FILTER }}
      HISTORICAL_BACKFILL_LIMIT: ${{ vars.HISTORICAL_BACKFILL_LIMIT || '1000' }}
      HISTORICAL_BACKFILL_MAX_PAGES: ${{ vars.HISTORICAL_BACKFILL_MAX_PAGES || '1' }}
      HISTORICAL_BACKFILL_MAX_TICKERS: ${{ vars.HISTORICAL_BACKFILL_MAX_TICKERS || '0' }}
      HISTORICAL_BACKFILL_START_TS: ${{ vars.HISTORICAL_BACKFILL_START_TS }}
      HISTORICAL_BACKFILL_END_TS: ${{ vars.HISTORICAL_BACKFILL_END_TS }}
      HISTORICAL_BACKFILL_PERIOD_INTERVAL: ${{ vars.HISTORICAL_BACKFILL_PERIOD_INTERVAL }}
      HISTORICAL_BACKFILL_INCLUDE_MARKETS: ${{ vars.HISTORICAL_BACKFILL_INCLUDE_MARKETS || 'true' }}
      HISTORICAL_BACKFILL_INCLUDE_TRADES: ${{ vars.HISTORICAL_BACKFILL_INCLUDE_TRADES || 'true' }}
      HISTORICAL_BACKFILL_INCLUDE_ORDERBOOK_SNAPSHOTS: ${{ vars.HISTORICAL_BACKFILL_INCLUDE_ORDERBOOK_SNAPSHOTS || 'false' }}
      HISTORICAL_BACKFILL_INCLUDE_CANDLESTICKS: ${{ vars.HISTORICAL_BACKFILL_INCLUDE_CANDLESTICKS || 'false' }}
      HISTORICAL_BACKFILL_DRY_RUN: ${{ vars.HISTORICAL_BACKFILL_DRY_RUN || 'false' }}
      HISTORICAL_BACKFILL_PARTITION_GRANULARITY: ${{ vars.HISTORICAL_BACKFILL_PARTITION_GRANULARITY || 'hour' }}
      FEATUREPLANT_SOURCE: ${{ vars.FEATUREPLANT_SOURCE || 'db' }}
      FEATUREPLANT_OUTPUT: ${{ vars.FEATUREPLANT_OUTPUT || 'stdout' }}
      FEATUREPLANT_DB_URL: ${{ vars.FEATUREPLANT_DB_URL || vars.DB_WRITER_DATABASE_URL }}
      FEATUREPLANT_DB_USER: ${{ vars.FEATUREPLANT_DB_USER || vars.DB_WRITER_DATABASE_USER }}
      FEATUREPLANT_DB_PASSWORD: ${{ secrets.FEATUREPLANT_DB_PASSWORD || secrets.DB_WRITER_DATABASE_PASSWORD }}
      FEATUREPLANT_DB_INCLUDE_REPLAY: ${{ vars.FEATUREPLANT_DB_INCLUDE_REPLAY || 'false' }}
      FEATUREPLANT_DB_REPLAY_ID: ${{ vars.FEATUREPLANT_DB_REPLAY_ID }}
      FEATUREPLANT_DB_CURSOR_NAME: ${{ vars.FEATUREPLANT_DB_CURSOR_NAME }}
      FEATUREPLANT_RECORDING_ROOT: ${{ vars.FEATUREPLANT_RECORDING_ROOT || '/app/recordings' }}
      FEATUREPLANT_AERON_CHANNEL: ${{ vars.FEATUREPLANT_AERON_CHANNEL }}
      FEATUREPLANT_STREAMS: ${{ vars.FEATUREPLANT_STREAMS || 'canonical.trade,canonical.ticker,derived.top_of_book' }}
      FEATUREPLANT_MODULES: ${{ vars.FEATUREPLANT_MODULES || 'bbo,ticker_snapshot,trade_tape' }}
      FEATUREPLANT_MAX_EVENTS: ${{ vars.FEATUREPLANT_MAX_EVENTS || '0' }}
      FEATUREPLANT_BATCH_SIZE: ${{ vars.FEATUREPLANT_BATCH_SIZE || '100' }}
      FEATUREPLANT_IDLE_SLEEP_MS: ${{ vars.FEATUREPLANT_IDLE_SLEEP_MS || '1' }}
      FEATUREPLANT_RUN_ONCE: ${{ vars.FEATUREPLANT_RUN_ONCE || 'true' }}
      FEATUREPLANT_METRICS_HOST_PORT: ${{ vars.FEATUREPLANT_METRICS_HOST_PORT || '8094' }}
      DB_PRIMARY_PRODUCT_FRONTEND_HOST_PORT: ${{ vars.DB_PRIMARY_PRODUCT_FRONTEND_HOST_PORT || '8090' }}
      FRONTEND_ADAPTER_DB_URL: ${{ vars.FRONTEND_ADAPTER_DB_URL || vars.DB_WRITER_DATABASE_URL }}
      FRONTEND_ADAPTER_DB_USER: ${{ vars.FRONTEND_ADAPTER_DB_USER || vars.DB_WRITER_DATABASE_USER }}
      FRONTEND_ADAPTER_DB_PASSWORD: ${{ secrets.FRONTEND_ADAPTER_DB_PASSWORD || secrets.DB_WRITER_DATABASE_PASSWORD }}
      FRONTEND_ADAPTER_FEATURE_SOURCE: ${{ vars.FRONTEND_ADAPTER_FEATURE_SOURCE || 'latest_market_state' }}
      FRONTEND_ADAPTER_FEATURE_OUTPUT_MAX_ROWS: ${{ vars.FRONTEND_ADAPTER_FEATURE_OUTPUT_MAX_ROWS || '10000' }}
      FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_ENABLED: ${{ vars.FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_ENABLED || 'true' }}
      FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_INTERVAL_MS: ${{ vars.FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_INTERVAL_MS || '1000' }}
      FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_MAX_ROWS: ${{ vars.FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_MAX_ROWS || '10000' }}
      FRONTEND_ADAPTER_METADATA_SOURCE: ${{ vars.FRONTEND_ADAPTER_METADATA_SOURCE || 'auto' }}
      FRONTEND_ADAPTER_METADATA_MAX_ROWS: ${{ vars.FRONTEND_ADAPTER_METADATA_MAX_ROWS || '1000' }}
      ENABLE_EC2_PTP: ${{ vars.ENABLE_EC2_PTP || 'false' }}
      EC2_PTP_DEVICE: ${{ vars.EC2_PTP_DEVICE || '/dev/ptp_ena' }}
      WSCLIENT_START_DELAY_SECONDS: ${{ vars.WSCLIENT_START_DELAY_SECONDS || '20' }}
    steps:
      - name: Validate required deployment secrets
        run: |
          set -euo pipefail
          missing=0
          require_present() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              printf 'deployment required configuration missing: %s\n' "$name" >&2
              missing=1
            else
              printf 'deployment required configuration present: %s\n' "$name"
            fi
          }
          require_present EC2_HOST "$EC2_HOST"
          require_present EC2_USER "$EC2_USER"
          require_present EC2_SSH_PRIVATE_KEY "${{ secrets.EC2_SSH_PRIVATE_KEY }}"
          require_present KALSHI_KEY_ID "$KALSHI_KEY_ID"
          require_present KALSHI_PRIVATE_KEY "$KALSHI_PRIVATE_KEY"
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Validate manual live-product rehearsal inputs
        run: |
          set -euo pipefail

          is_true() {
            case "$1" in
              true|TRUE|True|1|yes|YES|Yes) return 0 ;;
              *) return 1 ;;
            esac
          }

          fail_input() {
            printf 'live-product rehearsal input error: %s\n' "$1" >&2
            exit 1
          }

          require_present() {
            name="$1"
            eval "value=\${$name:-}"
            if [ -z "$value" ]; then
              printf 'live-product rehearsal required configuration missing: %s\n' "$name" >&2
              return 1
            fi
            printf 'live-product rehearsal required configuration present: %s\n' "$name"
            return 0
          }

          case "$DEPLOY_PROFILE" in
            cluster-live|live-product) ;;
            *) fail_input "DEPLOY_PROFILE must be cluster-live or live-product" ;;
          esac

          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            exit 0
          fi

          if is_true "$REQUIRE_LIVE_PRODUCT_DATA"; then
            [ "$DEPLOY_PROFILE" = "live-product" ] \
              || fail_input "require_live_product_data=true requires deploy_profile=live-product"
            is_true "$RUN_LIVE_PRODUCT_SMOKE" \
              || fail_input "require_live_product_data=true requires run_live_product_smoke=true"
          fi

          if is_true "$LIVE_PRODUCT_BROWSER_SMOKE_ENABLED" && ! is_true "$RUN_LIVE_PRODUCT_SMOKE"; then
            fail_input "run_live_product_browser_smoke=true requires run_live_product_smoke=true"
          fi

          if is_true "$RUN_LIVE_PRODUCT_SMOKE"; then
            [ "$DEPLOY_PROFILE" = "live-product" ] \
              || fail_input "run_live_product_smoke=true requires deploy_profile=live-product"
            [ "$DB_WRITER_ENABLED" = "true" ] \
              || fail_input "live-product rehearsal requires DB_WRITER_ENABLED=true"
            missing=0
            for name in \
              KALSHI_KEY_ID \
              KALSHI_PRIVATE_KEY \
              DB_WRITER_DATABASE_URL \
              DB_WRITER_DATABASE_USER \
              DB_WRITER_DATABASE_PASSWORD \
              FEATUREPLANT_DB_URL \
              FEATUREPLANT_DB_USER \
              FEATUREPLANT_DB_PASSWORD \
              FRONTEND_ADAPTER_DB_URL \
              FRONTEND_ADAPTER_DB_USER \
              FRONTEND_ADAPTER_DB_PASSWORD; do
              require_present "$name" || missing=1
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Download Docker image artifact
        uses: actions/download-artifact@v7
        with:
          name: kalshi-project-image-${{ github.sha }}
          path: image-artifact

      - name: Bootstrap EC2 host
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          if ! command -v git >/dev/null 2>&1; then
            sudo dnf install -y git
          fi

          if ! command -v curl >/dev/null 2>&1; then
            sudo dnf install -y curl
          fi

          if ! command -v python3 >/dev/null 2>&1; then
            sudo dnf install -y python3
          fi

          if ! command -v docker >/dev/null 2>&1; then
            sudo dnf install -y docker
          fi

          sudo systemctl enable --now docker

          if ! sudo docker compose version >/dev/null 2>&1; then
            sudo dnf install -y docker-compose-plugin || true
          fi

          if ! sudo docker compose version >/dev/null 2>&1; then
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -fsSL https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64 \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          fi
          REMOTE

      - name: Sync repository on EC2
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "bash -s" <<REMOTE
          set -euo pipefail
          APP_DIR="$DEPLOY_PATH"
          TARGET_SHA="${GITHUB_SHA}"
          sudo mkdir -p "\$APP_DIR"
          sudo chown "$EC2_USER:$EC2_USER" "\$APP_DIR"

          if [ -d "\$APP_DIR/.git" ]; then
            git -C "\$APP_DIR" remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
            git -C "\$APP_DIR" fetch --prune origin
            git -C "\$APP_DIR" checkout --detach "\$TARGET_SHA"
            git -C "\$APP_DIR" reset --hard "\$TARGET_SHA"
          else
            sudo find "\$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            git clone "https://github.com/${GITHUB_REPOSITORY}.git" "\$APP_DIR"
            git -C "\$APP_DIR" fetch --prune origin
            git -C "\$APP_DIR" checkout --detach "\$TARGET_SHA"
            git -C "\$APP_DIR" reset --hard "\$TARGET_SHA"
          fi

          current_sha="\$(git -C "\$APP_DIR" rev-parse HEAD)"
          if [ "\$current_sha" != "\$TARGET_SHA" ]; then
            echo "EC2 checkout mismatch: got \$current_sha expected \$TARGET_SHA" >&2
            exit 1
          fi

          sudo mkdir -p "\$APP_DIR/secrets" "\$APP_DIR/logs" "\$APP_DIR/recordings"
          sudo chown -R "$EC2_USER:$EC2_USER" "\$APP_DIR/secrets" "\$APP_DIR/logs"
          sudo chmod 700 "\$APP_DIR/secrets"
          REMOTE

      - name: Copy and load Docker image on EC2
        run: |
          set -euo pipefail
          image_tar="image-artifact/kalshi-project-${GITHUB_SHA}.tar.gz"
          test -s "$image_tar"
          case "$KALSHI_APP_IMAGE_TAR" in
            .deploy-state/images/*) ;;
            *)
              echo "KALSHI_APP_IMAGE_TAR must stay under .deploy-state/images: $KALSHI_APP_IMAGE_TAR" >&2
              exit 1
              ;;
          esac
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
            "mkdir -p '$DEPLOY_PATH/.deploy-state/images' && chmod 700 '$DEPLOY_PATH/.deploy-state' '$DEPLOY_PATH/.deploy-state/images'"
          scp -i ~/.ssh/ec2_key "$image_tar" "$EC2_USER@$EC2_HOST:$DEPLOY_PATH/$KALSHI_APP_IMAGE_TAR"
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "bash -s" <<REMOTE
          set -euo pipefail
          APP_DIR="$DEPLOY_PATH"
          STATE_DIR="\$APP_DIR/.deploy-state"
          LAST_SUCCESS_ENV="\$STATE_DIR/last_success.env"
          LAST_SUCCESS_IMAGE="\$STATE_DIR/last_success.image"
          LAST_SUCCESS_IMAGE_TAR="\$STATE_DIR/last_success.image_tar"
          IMAGE_TAR="\$APP_DIR/$KALSHI_APP_IMAGE_TAR"
          if [ ! -s "\$LAST_SUCCESS_IMAGE" ] && [ -s "\$LAST_SUCCESS_ENV" ]; then
            previous_image="\$(sed -n 's/^KALSHI_APP_IMAGE=//p' "\$LAST_SUCCESS_ENV" | tail -n 1)"
            if [ -n "\$previous_image" ] && sudo docker image inspect "\$previous_image" >/dev/null 2>&1; then
              safe_previous_image="\$(printf '%s' "\$previous_image" | tr -c 'A-Za-z0-9_.-' '_')"
              previous_tar_rel=".deploy-state/images/last-success-\$safe_previous_image.tar.gz"
              previous_tar="\$APP_DIR/\$previous_tar_rel"
              echo "Bootstrapping retained last-success image tar for \$previous_image at \$previous_tar_rel"
              sudo docker save "\$previous_image" | gzip -1 > "\$previous_tar"
              gzip -t "\$previous_tar"
              sha256sum "\$previous_tar" > "\$previous_tar.sha256"
              chmod 600 "\$previous_tar" "\$previous_tar.sha256"
              printf '%s\n' "\$previous_image" > "\$LAST_SUCCESS_IMAGE"
              printf '%s\n' "\$previous_tar_rel" > "\$LAST_SUCCESS_IMAGE_TAR"
              chmod 600 "\$LAST_SUCCESS_IMAGE" "\$LAST_SUCCESS_IMAGE_TAR"
            else
              echo "No local Docker image available to bootstrap previous last-success image tar: \${previous_image:-<unset>}"
            fi
          fi
          test -s "\$IMAGE_TAR"
          gzip -t "\$IMAGE_TAR"
          sha256sum "\$IMAGE_TAR" > "\$IMAGE_TAR.sha256"
          chmod 600 "\$IMAGE_TAR" "\$IMAGE_TAR.sha256"
          gzip -dc "\$IMAGE_TAR" | sudo docker load
          sudo docker image inspect "$KALSHI_APP_IMAGE" >/dev/null
          REMOTE

      - name: Configure EC2 PTP clock when enabled
        if: env.ENABLE_EC2_PTP == 'true'
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "cd '$DEPLOY_PATH' && EC2_PTP_DEVICE='$EC2_PTP_DEVICE' bash scripts/configure-ec2-ptp.sh"

      - name: Write runtime secrets and environment
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "mkdir -p '$DEPLOY_PATH/secrets'"
          printf '%s\n' "$KALSHI_PRIVATE_KEY" | ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
            "cat > '$DEPLOY_PATH/secrets/kalshi_private_key.pem' && chmod 600 '$DEPLOY_PATH/secrets/kalshi_private_key.pem'"

          case "$DEPLOY_PROFILE" in
            live-product|db-primary-product)
              case "$FRONTEND_ADAPTER_FEATURE_SOURCE" in
                feature_outputs|latest_market_state|latest_state|latest-state) ;;
                *)
                  echo "$DEPLOY_PROFILE requires FRONTEND_ADAPTER_FEATURE_SOURCE=feature_outputs or latest_market_state" >&2
                  exit 1
                  ;;
              esac
              ;;
          esac

          cat > deploy.env <<EOF
          BACKEND_PROFILE=production
          KALSHI_APP_IMAGE=$KALSHI_APP_IMAGE
          KALSHI_APP_IMAGE_TAR=$KALSHI_APP_IMAGE_TAR
          KALSHI_RELEASE_SHA=$KALSHI_RELEASE_SHA
          KALSHI_DEPLOY_PROFILE=$KALSHI_DEPLOY_PROFILE
          KALSHI_GITHUB_RUN_ID=$KALSHI_GITHUB_RUN_ID
          KALSHI_GITHUB_RUN_ATTEMPT=$KALSHI_GITHUB_RUN_ATTEMPT
          COMPOSE_HOST_BIND_IP=$COMPOSE_HOST_BIND_IP
          KALSHI_BASE_URL=$KALSHI_BASE_URL
          KALSHI_KEY_ID=$KALSHI_KEY_ID
          KALSHI_KEY_PATH=/run/secrets/kalshi_private_key
          KALSHI_KEY_HOST_PATH=$DEPLOY_PATH/secrets/kalshi_private_key.pem
          KALSHI_MARKET_TICKERS=$KALSHI_MARKET_TICKERS
          KALSHI_MARKET_SERIES_TICKER=$KALSHI_MARKET_SERIES_TICKER
          KALSHI_MARKET_SELECTION_MODE=$KALSHI_MARKET_SELECTION_MODE
          KALSHI_MARKET_STATUS=$KALSHI_MARKET_STATUS
          KALSHI_MARKET_MVE_FILTER=$KALSHI_MARKET_MVE_FILTER
          KALSHI_MARKET_DISCOVERY_LIMIT=$KALSHI_MARKET_DISCOVERY_LIMIT
          KALSHI_MARKET_DISCOVERY_MAX_MARKETS=$KALSHI_MARKET_DISCOVERY_MAX_MARKETS
          KALSHI_WS_CHANNELS=$KALSHI_WS_CHANNELS
          KALSHI_WS_GLOBAL_CHANNELS=$KALSHI_WS_GLOBAL_CHANNELS
          KALSHI_WS_FILTERED_CHANNELS=$KALSHI_WS_FILTERED_CHANNELS
          KALSHI_ORDERBOOK_SUBSCRIPTION_CHUNK_SIZE=$KALSHI_ORDERBOOK_SUBSCRIPTION_CHUNK_SIZE
          KALSHI_ORDERBOOK_MARKETS_PER_CONNECTION=$KALSHI_ORDERBOOK_MARKETS_PER_CONNECTION
          KALSHI_WS_SUBSCRIPTION_DELAY_MS=$KALSHI_WS_SUBSCRIPTION_DELAY_MS
          KALSHI_WS_ACK_TIMEOUT_MS=$KALSHI_WS_ACK_TIMEOUT_MS
          BACKEND_WS_RECONNECT_ENABLED=$BACKEND_WS_RECONNECT_ENABLED
          BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS=$BACKEND_WS_RECONNECT_INITIAL_BACKOFF_MS
          BACKEND_WS_RECONNECT_MAX_BACKOFF_MS=$BACKEND_WS_RECONNECT_MAX_BACKOFF_MS
          BACKEND_WS_RECONNECT_MAX_ATTEMPTS=$BACKEND_WS_RECONNECT_MAX_ATTEMPTS
          BACKEND_SOURCE_SEQUENCE_MONITOR_ENABLED=$BACKEND_SOURCE_SEQUENCE_MONITOR_ENABLED
          BACKEND_ORDERBOOK_DERIVED_ENABLED=$BACKEND_ORDERBOOK_DERIVED_ENABLED
          BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED=$BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_ENABLED
          BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT=$BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_FRAGMENT_LIMIT
          BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS=$BACKEND_ORDERBOOK_RECOVERY_GAP_CONSUMER_IDLE_SLEEP_MS
          BACKEND_METRICS_PORT=$BACKEND_METRICS_PORT
