          FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_INTERVAL_MS=$FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_INTERVAL_MS
          FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_MAX_ROWS=$FRONTEND_ADAPTER_FEATURE_OUTPUT_REFRESH_MAX_ROWS
          FRONTEND_ADAPTER_METADATA_SOURCE=$FRONTEND_ADAPTER_METADATA_SOURCE
          FRONTEND_ADAPTER_METADATA_MAX_ROWS=$FRONTEND_ADAPTER_METADATA_MAX_ROWS
