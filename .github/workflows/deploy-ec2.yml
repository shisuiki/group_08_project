          FEATUREPLANT_MAX_EVENTS=$FEATUREPLANT_MAX_EVENTS
          FEATUREPLANT_BATCH_SIZE=$FEATUREPLANT_BATCH_SIZE
          FEATUREPLANT_IDLE_SLEEP_MS=$FEATUREPLANT_IDLE_SLEEP_MS
          FEATUREPLANT_RUN_ONCE=$FEATUREPLANT_RUN_ONCE
