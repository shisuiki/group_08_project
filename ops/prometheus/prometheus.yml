global:
  scrape_interval: 10s

scrape_configs:
  - job_name: frontend-stream-adapter
    static_configs:
      - targets: ["frontend-adapter:8090"]

  - job_name: tickerplant-stream-recorder
    static_configs:
      - targets: ["stream-recorder:8092"]

  - job_name: streamtap
    static_configs:
      - targets: ["streamtap:8080"]
